<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8401a"/>
      <stop offset="100%" style="stop-color:#e04d20"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="400" x2="1200" y2="400" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="600" x2="1200" y2="600" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="800" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="800" fill="url(#accent)"/>
  <!-- Price -->
  <text x="600" y="300" font-family="Georgia, serif" font-size="180" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-8">£50</text>
  <text x="600" y="370" font-family="Georgia, serif" font-size="36" font-weight="400" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="8">/ MONTH</text>
  <!-- Name -->
  <text x="600" y="460" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#c8401a" text-anchor="middle" letter-spacing="6">THE FIFTY PLAN</text>
  <!-- Features -->
  <text x="600" y="530" font-family="monospace" font-size="18" fill="rgba(255,255,255,0.4)" text-anchor="middle">Custom Design · Hosting · SSL · SEO · Unlimited Updates</text>
  <!-- Logo -->
  <text x="80" y="760" font-family="Georgia, serif" font-size="40" font-weight="900" fill="rgba(255,255,255,0.15)" letter-spacing="-2">Fifty.</text>
</svg>